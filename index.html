  <!-- Preload критических ресурсов -->
  <link rel="preload" href="flutter_bootstrap.js" as="script">
  <link rel="preload" href="main.dart.js" as="script">
  <link rel="preload" href="assets/AssetManifest.bin.json" as="fetch">
  <link rel="preload" href="assets/FontManifest.json" as="fetch">

  <!-- Стили для начального экрана -->
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #4A6FA5;
    }
    /* Стиль для загрузки */
    .loading-container {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
      font-size: 18px;
    }
    .loading-spinner {
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top: 4px solid #ffffff;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin-right: 16px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- Начальный экран загрузки -->
  <div id="loading" class="loading-container">
    <div class="loading-spinner"></div>
    <span>Загрузка приложения...</span>
  </div>

  <!-- Загрузка Flutter -->
  <script src="flutter_bootstrap.js" async></script>
  
  <script>
    // Скрываем начальный экран после загрузки Flutter
    document.addEventListener('DOMContentLoaded', function() {
      // Проверяем, загрузился ли Flutter
      const checkFlutter = setInterval(function() {
        if (document.getElementById('flt-initialize')) {
          clearInterval(checkFlutter);
          // Плавно скрываем начальный экран
          const loading = document.getElementById('loading');
          if (loading) {
            loading.style.transition = 'opacity 0.5s';
            loading.style.opacity = '0';
            setTimeout(() => {
              loading.style.display = 'none';
            }, 500);
          }
        }
      }, 100);
    });
  </script>
</body>
