<!DOCTYPE html>
<html>
<head>
  <!-- Базовый URL для GitHub Pages -->
  <base href="/password_manager_web/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Безопасный менеджер паролей">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- PWA настройки -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Password Manager">
  
  <!-- Theme Color -->
  <meta name="theme-color" content="#4A6FA5">

  <!-- PWA Manifest -->
  <link rel="manifest" href="manifest.json">

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="shortcut icon" href="favicon.ico">
  <link rel="icon" type="image/png" href="icons/icon-192.png">

  <!-- Apple Touch Icons -->
  <link rel="apple-touch-icon" sizes="72x72" href="icons/icon-72.png">
  <link rel="apple-touch-icon" sizes="96x96" href="icons/icon-96.png">
  <link rel="apple-touch-icon" sizes="128x128" href="icons/icon-128.png">
  <link rel="apple-touch-icon" sizes="144x144" href="icons/icon-144.png">
  <link rel="apple-touch-icon" sizes="152x152" href="icons/icon-152.png">
  <link rel="apple-touch-icon" sizes="192x192" href="icons/icon-192.png">
  <link rel="apple-touch-icon" sizes="384x384" href="icons/icon-384.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icons/icon-512.png">

  <!-- Title -->
  <title>Password Manager</title>

  <!-- Стили для предотвращения белого экрана -->
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
    }
    #app {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    /* Скелетон-загрузка */
    .loading-container {
      text-align: center;
      animation: fadeIn 0.5s ease-in;
    }
    .loading-icon {
      font-size: 64px;
      color: #4A6FA5;
      animation: pulse 1.5s ease-in-out infinite;
    }
    .loading-text {
      margin-top: 16px;
      font-size: 20px;
      font-weight: 600;
      color: #2C3E50;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.1); opacity: 0.7; }
    }
  </style>
</head>
<body>

  <!-- Загрузка Flutter -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
